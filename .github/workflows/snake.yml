name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Animation
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
          # Custom Zoro-themed colors for your contribution grid dots:
          # [empty, low, medium, high, max]
          color_snake: "#194D33" # Moss Green snake body
          color_dots: "#161b22,#FFFFFF,#582C83,#A10000,#0B301D" 
          # White (Wado Ichimonji), Purple (Enma), Crimson (Kitetsu), Deep Green (Marimo)

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
